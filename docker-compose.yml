services:
  db:
    image: mysql:8.0
    container_name: hrm-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hrm
      MYSQL_ROOT_PASSWORD: something
    volumes:
      - hrm_mysql_data:/var/lib/mysql
    expose:
      - "3306"

  backend:
    build:
      context: ./backend
    container_name: hrm-backend
    restart: always
    volumes:
      - hrm_uploads:/app/uploads
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: hrm-frontend
    restart: always
    expose:
      - "80"

volumes:
  hrm_mysql_data:
  hrm_uploads: