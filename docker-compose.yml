services:
  db:
    image: mysql:8.0
    container_name: hrm-mysql
    restart: always
    environment:
      MYSQL_DATABASE: lotushrm
      MYSQL_ROOT_PASSWORD: 26082003
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - hrm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hrm-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASSWORD: 26082003
      APP_DEFAULT_PASSWORD: Admin@2026
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: hrm-frontend
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.25
    container_name: hrm-nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/proxy.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  hrm_mysql_data:
  backend_uploads: