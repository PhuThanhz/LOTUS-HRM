version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hrm-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hrm
      MYSQL_ROOT_PASSWORD: strongPassword
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - hrm_mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: hrm-backend
    restart: always
    depends_on:
      - db
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: hrm-frontend
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.25
    container_name: hrm-nginx
    restart: always
    ports:
      - "8081:80"   # HRM chạy riêng port 8081
    volumes:
      - ./nginx/proxy.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  hrm_mysql_data: