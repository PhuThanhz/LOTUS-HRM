# ================= HRM =================
server {
    listen 80;
    server_name hrm.sys.vlotustech.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hrm.sys.vlotustech.vn;

    ssl_certificate /etc/letsencrypt/live/hrm.sys.vlotustech.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrm.sys.vlotustech.vn/privkey.pem;

    client_max_body_size 200M;

    location / {
        proxy_pass http://hrm-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://hrm-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}